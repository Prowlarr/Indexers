---
id: bjshare
name: Bj-Share
description: "Private PT-BR torrent"
language: pt-BR
type: private
encoding: UTF-8
links:
  - https://bj-share.info/

caps:
  categorymappings:
    - {id: 1, cat: Movies, desc: "Filmes"}
    - {id: 2, cat: TV, desc: "TV"}
    - {id: 3, cat: PC, desc: "Aplicativos"}
    - {id: 4, cat: PC/Games, desc: "Jogos"}
    - {id: 5, cat: Books/Comics, desc: "Mangás"}
    - {id: 6, cat: TV, desc: "Vídeos de TV"}
    - {id: 7, cat: Other, desc: "Outros"}
    - {id: 8, cat: TV/Sport, desc: "Esportes"}
    - {id: 9, cat: Books/Mags, desc: "Revistas"}
    - {id: 10, cat: Books, desc: "E-Books"}
    - {id: 11, cat: Audio/Audiobook, desc: "Audiobook"}
    - {id: 12, cat: Books/Comics, desc: "Histórias em Quadrinhos"}
    - {id: 13, cat: TV, desc: "Stand Up Comedy"}
    - {id: 14, cat: TV, desc: "TV/Anime"} # Anime format is equal to TV Show (SXXEXX) except old ones like one piece
    - {id: 15, cat: XXX/ImageSet, desc: "Fotos Adultas"}
    - {id: 16, cat: TV/Other, desc: "Desenho Animado"}
    - {id: 17, cat: TV/Documentary, desc: "Documentários"}
    - {id: 18, cat: Other, desc: "Cursos"}
    - {id: 19, cat: XXX, desc: "Filmes Adultos"}
    - {id: 20, cat: XXX/Other, desc: "Jogos Adultos"}
    - {id: 21, cat: XXX/Other, desc: "Mangás Adultos"}
    - {id: 22, cat: XXX/Other, desc: "Animes Adultos"}
    - {id: 23, cat: XXX/Other, desc: "HQ Adultos"}

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]

settings:
  - name: cookie
    type: text
    label: Cookie
  - name: info_cookie
    type: info_cookie
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false

login:
  method: cookie
  inputs:
    cookie: "{{ .Config.cookie }}"
  test:
    path: index.php
    selector: a[href^="/logout.php?auth="]

search:
  # https://bj-share.info/torrents.php?searchstr=aves+de+rapina&filter_cat%5B1%5D=1
  paths:
    - path: torrents.php

  inputs:
    $raw: "{{ range .Categories }}filter_cat[{{.}}]=1&{{end}}"
    searchstr: "{{ .Keywords }}"
    freetorrent: "{{ if .Config.freeleech }}1{{ else }}{{ end }}"

  keywordsfilters:
    - name: re_replace
      args: ["\\s*S\\d{2}(E\\d{2})?$", ""]

  rows:
    selector: "table.torrent_table > tbody > tr.group,
               table.torrent_table > tbody > tr.group_torrent.edition_0,
               table.torrent_table > tbody > tr.torrent"
    filters:
      - name: andmatch

  fields:
    download:
      selector: a[title="Baixar"]
      attribute: href

    # data-torrentname: nome real do arquivo/diretório — disponível em tr.group via div.torrent_info
    # tr.group_torrent.edition_0 não tem div.torrent_info, fica vazio e cai no fallback
    _torrentname:
      selector: div.torrent_info
      attribute: data-torrentname

    _imdbid:
      selector: div.torrent_info
      attribute: data-imdbid

    _year:
      selector: div.torrent_info
      attribute: data-year

    # fallback para tr.group_torrent.edition_0 que não tem div.torrent_info
    _rawTitle:
      selector: "div.group_info"
      filters:
        - name: re_replace
          args: ["(\n.*)", ""]
        - name: re_replace
          args: ["  |\t", ""]

    _rawYear:
      selector: "div.group_info"
      filters:
        - name: regexp
          args: "\\[([0-9]{4})\\]"

    _multipleTorrentInfo:
      selector: "a[href^='torrents.php?id=']:not(.tooltip)"
      filters:
        - name: replace
          args: ["Full HD", "1080p"]
        - name: replace
          args: ["4K", "2160p"]
        - name: replace
          args: ["SD", "480p"]
        - name: replace
          args: ["/ HD]", "720p"]
        - name: replace
          args: ["/ HD /", "720p"]
        - name: replace
          args: ["/ Free", ""]
        - name: re_replace
          args: ["[\\[\\]]+", ""]

    # título do grupo para tr.group_torrent (herda via Cardigann do tr.group pai)
    _fallbackTitle:
      text: "{{ .Result._rawTitle }}"
      filters:
        - name: re_replace
          args: ["\\[[0-9]*\\].*", ""]
        - name: re_replace
          args: ["(.+)\\[([^0-9][^\\]/]*?)(?:/[^\\]]*?)?\\]", "$2"]
        - name: re_replace
          args: ["\\s*-?\\s*$", ""]
        - name: re_replace
          args: [" - (S\\d+)", " $1"]
        - name: append
          args: " {{ .Result._rawYear }}"
        - name: append
          args: " {{ .Result._multipleTorrentInfo }}"
        - name: re_replace
          args: ["\\s+", " "]
        - name: re_replace
          args: ["\\s+$", ""]

    details:
      selector: a[href^="torrents.php?id="]:not(.tooltip)
      attribute: href

    imdbid:
      text: "{{ .Result._imdbid }}"
      filters:
        - name: regexp
          args: "(tt\\d+)"

    category_details:
      selector: td.cats_col > a
      attribute: href
      filters:
        - name: regexp
          args: "%5b(\\d+?)%5d"

    category:
      text: "{{ .Result.category_details }}"

    # usa data-torrentname quando disponível (tr.group); cai no fallback para tr.group_torrent
    title:
      text: "{{ if .Result._torrentname }}{{ .Result._torrentname }}{{ else }}{{ .Result._fallbackTitle }}{{ end }}"

    date:
      selector: td.nobr span.time
      attribute: title
      filters:
        - name: append
          args: " +00:00" # GMT
        - name: dateparse
          args: "MMM dd yyyy, HH:mm zzz"

    size:
      # tr.group / tr.torrent: size at position 6 | tr.group_torrent: colspan td counts as 1, size at position 4
      selector: "td:nth-child(6).number_column.nobr, td:nth-child(4).number_column.nobr"
      optional: true
    grabs:
      selector: "td.number_column:nth-child(5)"
      optional: true
    seeders:
      selector: "td.number_column:nth-last-child(2)"
    leechers:
      selector: "td.number_column:nth-last-child(1)"
    downloadvolumefactor:
      case:
        "strong.torrent_label.bjtooltip.free": 0
        "*": 1
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 1.0
    minimumseedtime:
      # 7 days (as seconds = 7 x 24 x 60 x 60)
      text: 604800

    season:
      text: "{{ if .Result._torrentname }}{{ .Result._torrentname }}{{ else }}{{ .Result._rawTitle }}{{ end }}"
      filters:
        - name: regexp
          args: "[Ss](\\d{2})[Ee]?\\d*"

    episode:
      text: "{{ if .Result._torrentname }}{{ .Result._torrentname }}{{ else }}{{ .Result._rawTitle }}{{ end }}"
      filters:
        - name: regexp
          args: "[Ss]\\d{2}[Ee](\\d{2})"

