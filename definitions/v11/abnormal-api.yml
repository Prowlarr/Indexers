---
id: abnormal-api2
name: Abnormal (API2)
description: "ABNormal (ABN) is a FRENCH Private Torrent Tracker for MOVIES / TV / GENERAL"
language: fr-FR
type: private
encoding: UTF-8
requestDelay: 2.1
links:
  - https://api.abn.lol/
legacylinks:
  - https://abn.lol/
  - https://abnormal.ws

caps:
  categorymappings:
    - {id: 1, cat: TV, desc: "Series"}
    - {id: 2, cat: Movies, desc: "Movies"}
    - {id: 3, cat: TV/Documentary, desc: "Documentaries"}
    - {id: 4, cat: TV/Anime, desc: "Anime"}
    - {id: 5, cat: PC/Games, desc: "Games"}
    - {id: 6, cat: PC, desc: "Applications"}
    - {id: 7, cat: Books/EBook, desc: "Ebooks"}
    - {id: 9, cat: TV, desc: "Emissions"}

  modes:
    search: [q]
    tv-search: [q, season, ep]
    movie-search: [q]
    book-search: [q]

settings:
  - name: apikey
    type: text
    label: APIKey
  - name: info_key
    type: info
    label: About your API key
    default: "Find or Generate a new API Token by accessing your <a href=\"https://abn.lol/\" target=\"_blank\">Abnormal</a> account <i>My Profile</i> page. The API key provides read-only access and never expires."
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: multilang
    type: checkbox
    label: Replace MULTi by another language in release name
    default: false
  - name: multilanguage
    type: select
    label: Replace MULTi by this language
    default: FRENCH
    options:
      FRENCH: FRENCH
      MULTi.FRENCH: MULTi.FRENCH
      ENGLISH: ENGLISH
      MULTi.ENGLISH: MULTi.ENGLISH
      VOSTFR: VOSTFR
      MULTi.VOSTFR: MULTi.VOSTFR
  - name: vostfr
    type: checkbox
    label: Replace VOSTFR and SUBFRENCH with ENGLISH
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: Created
    options:
      Created: created
      Seeders: seeders
      Size: size
      ReleaseName: title
  - name: type
    type: select
    label: Order requested from site
    default: DESC
    options:
      DESC: desc
      ASC: asc
  - name: info_activity
    type: info
    label: Account Inactivity
    default: "Accounts are automatically deactivated after 4 months of inactivity (no connection to the site)."

login:
  path: /api/Release/Search?name=test&resultByPage=1
  method: get
  headers:
    Authorization: ["Bearer {{ .Config.apikey }}"]
  inputs: {}
  error:
    - selector: :root:contains("Unauthorized")
      message:
        text: "The API key was not accepted by {{ .Config.sitelink }}."

search:
  paths:
    - path: /api/Release/Search
      response:
        type: json

  headers:
    Authorization: ["Bearer {{ .Config.apikey }}"]

  inputs:
    name: "{{ .Keywords }}"
    categoryId: "{{ join .Categories \",\" }}"
    resultByPage: 100
    sort: "{{ .Config.sort }}"
    sortDirection: "{{ .Config.type }}"
    # freeleech: "{{ if .Config.freeleech }}true{{ else }}{{ end }}" # API does not support this parameter yet

  keywordsfilters:
    - name: re_replace
      args: ["\\.", " "]

  rows:
    selector: $

  fields:
    category:
      selector: categoryId
    title_phase1:
      selector: name
    title_vostfr:
      text: "{{ .Result.title_phase1 }}"
      filters:
        - name: re_replace
          args: ["(?i)\\b(vostfr|subfrench)\\b", "ENGLISH"]
    title_phase2:
      text: "{{ if .Config.vostfr }}{{ .Result.title_vostfr }}{{ else }}{{ .Result.title_phase1 }}{{ end }}"
    title_multilang:
      text: "{{ .Result.title_phase2 }}"
      filters:
        - name: re_replace
          args: ["(?i)\\b(MULTI(?!.*(?:FRENCH|ENGLISH|VOSTFR)))\\b", "{{ .Config.multilanguage }}"]
    title:
      text: "{{ if .Config.multilang }}{{ .Result.title_multilang }}{{ else }}{{ .Result.title_phase2 }}{{ end }}"
    details:
      selector: detailsUrl
    download:
      selector: downloadUrl
    infohash:
      selector: infoHash
    date:
      selector: created
      filters:
        - name: append
          args: " +01:00"
        - name: dateparse
          args: "yyyy-MM-ddTHH:mm:ss.fffffffzzz"
    size:
      selector: size
    seeders:
      selector: seeders
    leechers:
      selector: leechers
    grabs:
      selector: completed
    downloadvolumefactor:
      selector: freeleech
      case:
        True: 0
        False: 1
        "*": 1 # catch errors, default to not free
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 1.0
    minimumseedtime:
      # 4 days (as seconds = 4 x 24 x 60 x 60)
      text: 345600
# ABN API
